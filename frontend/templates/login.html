{% extends "base.html" %}
{% block title %}Đăng nhập{% endblock %}
{% block auth_content %}
<div class="card form">
  <h1>Đăng nhập</h1>
  <p class="muted">Truy cập hệ thống hỗ trợ tập squat.</p>
  {% with messages = get_flashed_messages() %}
    {% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}
  {% endwith %}
  <form method="post">
    <label>Username</label>
    <input name="username" required autofocus>
    <label>Mật khẩu</label>
    <input name="password" type="password" required>
    <div class="actions" style="margin-top:16px">
      <button class="button" type="submit">Đăng nhập</button>
      <a class="button secondary" href="{{ url_for('auth.register') }}">Đăng ký user</a>
      <a class="button secondary" href="{{ url_for('auth.register_admin') }}">Tạo admin</a>
    </div>
  </form>
</div>
{% endblock %}
